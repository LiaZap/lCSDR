services:
  agente:
    build: ./agente
    container_name: lc-sdr-agente
    env_file:
      - ./agente/.env
    environment:
      - NODE_ENV=development
      - PORT=3333
    ports:
      - "3333:3333"
    volumes:
      # Persiste o SQLite fora do container
      - ./agente/data:/app/data
      # Bind-mount do código pra hot reload em dev (comente em prod)
      - ./agente/src:/app/src
      - ./agente/scripts:/app/scripts
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3333/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - lc-net

  dashboard:
    build: ./dashboard
    container_name: lc-sdr-dashboard
    environment:
      # Dentro da rede docker, o backend é acessível pelo service name
      - VITE_API_TARGET=http://agente:3333
      # Polling é obrigatório pro HMR detectar mudanças via bind-mount no Windows
      - CHOKIDAR_USEPOLLING=true
      - DOCKER=true
    ports:
      - "5173:5173"
    volumes:
      - ./dashboard/src:/app/src
      - ./dashboard/index.html:/app/index.html
      - ./dashboard/vite.config.js:/app/vite.config.js
    depends_on:
      - agente
    restart: unless-stopped
    networks:
      - lc-net

networks:
  lc-net:
    driver: bridge

# Nginx do dashboard: serve build estática + proxy /api e /auth pro backend
#
# No EasyPanel, ambos serviços (dashboard e agente) ficam na mesma rede do projeto.
# O backend é alcançável pelo nome do serviço: http://agente:3333
# Em outros provedores, ajuste BACKEND_URL via env var no entrypoint se preciso.

server {
    listen 80;
    server_name _;

    # Comprime tudo
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 256;

    # Build estática do React
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — qualquer rota cai no index.html (HashRouter cuida do resto)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache forte pros assets buildados (têm hash no nome)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # === API: proxy pro backend ===
    location /api/ {
        proxy_pass http://agente:3333;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /auth/ {
        proxy_pass http://agente:3333;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # === Webhook uazapi/GHL (mesmo subdomínio) ===
    location /webhook/ {
        proxy_pass http://agente:3333;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Healthcheck do backend exposto pra debug
    location = /health {
        proxy_pass http://agente:3333/health;
    }
}
